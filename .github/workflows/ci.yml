name: CI

# Garde-fou de non-régression : exécute les tests unitaires à chaque push / PR.
# Les tests ciblés (scoring, métriques, cache, anti-injection) ne nécessitent ni
# torch ni téléchargement de modèle SBERT → CI rapide et fiable.
# L'évaluation complète du RAG (python -m evaluation.evaluate_rag) reste lançable
# en local ; elle n'est pas exécutée ici pour éviter le téléchargement du modèle.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas python-dotenv google-generativeai pytest

      - name: Run unit tests
        run: |
          pytest -q tests/test_scoring.py tests/test_metrics.py \
                    tests/test_cache.py tests/test_genai_safety.py
